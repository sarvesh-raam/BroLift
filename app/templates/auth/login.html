{% extends "base.html" %}
{% block title %}Sign In — BroLift{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="card" style="width: 100%; max-width: 400px; margin: 40px auto;">
        <div style="text-align: center; margin-bottom: 32px;">
            <span class="logo-text" style="display: inline-block; font-size: 28px;">Bro<span
                    class="logo-accent">Lift</span></span>
            <h2 style="margin-top: 16px; font-weight: 400;">Sign In</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">Use your SRM IST account</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email (st6546@srmist.edu.in)" required
                    autofocus>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-form-submit">Next</button>
        </form>

        <p style="text-align: center; margin-top: 32px; font-size: 14px;">
            Not your computer? Use Guest mode to sign in privately. <br><br>
            <a href="{{ url_for('auth.register') }}" style="font-weight: 500;">Create account</a>
        </p>
    </div>
</div>
{% endblock %}
